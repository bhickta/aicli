# =============================================================================
# UPSC Topper Answer Sheet Analysis — Prompt & Dimension Configuration
# =============================================================================
# All prompts are editable here without touching code.
# To add a new analysis dimension, add an entry under `dimensions:` and restart.
# =============================================================================

# --- LM Studio Settings ---
lm_studio:
  max_tokens: 2000
  temperature: 0.1
  max_retries: 3
  retry_backoff_base: 2
  image_max_size: 1024   # Higher res for handwriting legibility

# --- Step 2: Page Classification ---
classification:
  prompt: |
    You are an expert at classifying pages from Indian UPSC civil services exam answer sheets.

    Classify this page image into EXACTLY ONE of these categories:
    - "cover" — Cover page with candidate name, registration number, test code, or exam instructions
    - "evaluation" — Evaluation/marks sheet with examiner markings, scores grid, or official stamps
    - "answer" — A page that starts a NEW answer to a question (has a printed question or clearly begins a new answer)
    - "continuation" — A page that continues an answer from the previous page (no new question header, writing continues from previous page)
    - "blank" — Empty page or page with only margin text/instructions, no handwritten content

    Rules:
    - If the page has a printed question number (e.g., Q.1, Q.2) followed by handwritten answer text, classify as "answer"
    - If the page has only handwritten text continuing from a previous page with no new question header, classify as "continuation"
    - If you see evaluation marks, scoring grids, or examiner signatures, classify as "evaluation"
    - If the page is mostly empty with only pre-printed instructions, classify as "blank"

    Respond with ONLY the category word, nothing else. No explanation, no quotes.

# --- Step 3: OCR Transcription (Vision Model Only) ---
transcription:
  prompt: |
    You are an expert OCR assistant specializing in Indian civil services (UPSC) exam answer sheets.
    Transcribe ALL content from this image with maximum accuracy.

    This is a handwritten answer sheet — use the IMAGE as the sole ground truth.

    Content types present:
    - Printed text in Hindi (Devanagari) and English
    - Handwritten cursive English answers
    - Hand-drawn diagrams with labels
    - Boxed section headers
    - Numbered lists with symbols (①②③) or decimal (1.1, 1.2)
    - Underlined phrases
    - Strikethrough words

    Rules:
    - Transcribe EXACTLY what is written — never correct spelling or grammar
    - Misspelled words: transcribe as-is and add [sic]
    - Unreadable words: write [unclear: your_best_guess]
    - Below 80% confidence: write [unclear: your_best_guess]
    - Never hallucinate or invent text
    - Hindi/Devanagari: transcribe exactly, do NOT translate, if unclear write [Hindi: unclear]
    - Handwriting: transcribe letter by letter, do not auto-correct
    - Underlines: <u>exact underlined words only</u> — verify stroke by stroke
    - Circled numbers: ① ② ③ — never convert to 1. 2. 3.
    - Strikethroughs: ~~word~~
    - Boxes: [BOX: text inside box]
    - Margin text: [margin: standard exam instructions]
    - Diagrams: describe spatial layout, all labels, arrow directions, caption
    - Geographic shapes in diagrams: identify if it resembles a map
    - Figure captions exactly as written

    Output format:
    ### Printed Text
    ### Handwritten Answer
    ### Diagrams
    ### Additional Elements
    ### Confidence Notes

# --- Step 4: Answer Segmentation ---
segmentation:
  prompt: |
    You are analyzing transcribed pages from a UPSC answer booklet.
    Below are the transcribed pages in order. Each page is marked with its page number.

    {pages_text}

    Your task: identify EACH distinct answer (question-answer pair) and which pages it spans.

    For each answer, extract:
    - question_number: the question number as written (e.g., "Q.1", "1(a)", "Q.5(b)")
    - question_text: the full printed question text (if visible)
    - question_directive: the verb/instruction (e.g., "Discuss", "Examine", "Critically analyze")
    - word_limit: the word limit if specified (e.g., 150, 250)
    - start_page: the page number where this answer begins
    - end_page: the page number where this answer ends (same as start_page if single-page)

    Return strict JSON array:
    [
      {
        "question_number": "Q.1(a)",
        "question_text": "Discuss the role of...",
        "question_directive": "Discuss",
        "word_limit": 150,
        "start_page": 3,
        "end_page": 4
      }
    ]

    Rules:
    - If a question spans multiple pages, set end_page accordingly
    - If the question text is not visible (continuation only), set question_text to null
    - Return ONLY valid JSON, no other text

# --- Step 5: Analysis Dimensions ---
# Each dimension is independent. To add a new one, just add an entry here.
dimensions:
  intro:
    enabled: true
    prompt: |
      Analyze only the introduction (first 2-3 sentences) of this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Identify: pattern type (definition/context/constitutional/statistical/question_reframe), exact text, effectiveness markers.

      Return strict JSON:
      {
        "pattern_type": "definition|context|constitutional|statistical|question_reframe",
        "text": "exact intro text",
        "word_count": 0,
        "has_definition": false,
        "has_statistic": false,
        "has_constitutional_ref": false,
        "has_current_event": false,
        "effectiveness_markers": []
      }

      Return ONLY valid JSON, no other text.

  outro:
    enabled: true
    prompt: |
      Analyze only the conclusion (last 2-3 sentences) of this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Identify: pattern type (recommendation/forward_looking/source_citation/balanced_view/way_forward), exact text, sources cited.

      Return strict JSON:
      {
        "pattern_type": "recommendation|forward_looking|source_citation|balanced_view|way_forward",
        "text": "exact outro text",
        "word_count": 0,
        "has_recommendation": false,
        "has_source_citation": false,
        "source_cited": null,
        "has_way_forward": false,
        "has_statistic": false
      }

      Return ONLY valid JSON, no other text.

  transition:
    enabled: true
    prompt: |
      Analyze the transition phrases and connectors used in this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Identify how the writer moves between introduction, body sections, and conclusion.

      Return strict JSON:
      {
        "intro_to_body_phrase": "exact phrase or null",
        "between_sections_phrases": [],
        "body_to_conclusion_phrase": "exact phrase or null",
        "transition_style": "abrupt|smooth|formulaic"
      }

      Return ONLY valid JSON, no other text.

  formatting:
    enabled: true
    prompt: |
      Analyze only the formatting and visual structure of this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Return strict JSON:
      {
        "numbering_style": "decimal|circled|bullet|mixed|none",
        "uses_boxes": false,
        "boxed_texts": [],
        "uses_underlines": false,
        "underlined_count": 0,
        "what_gets_underlined": [],
        "uses_strikethrough": false,
        "body_format": "numbered_points|paragraphs|mixed",
        "avg_lines_per_point": 0.0,
        "has_section_headers": false,
        "header_style": null
      }

      Return ONLY valid JSON, no other text.

  diagram:
    enabled: true
    prompt: |
      Analyze diagram usage in this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Return strict JSON:
      {
        "has_diagram": false,
        "diagram_count": 0,
        "diagrams": [
          {
            "type": "map|flowchart|table|timeline|sketch|other",
            "position": "intro|middle|end",
            "labels": [],
            "caption": null,
            "spatial_description": "",
            "question_directive_that_triggered_it": null
          }
        ]
      }

      Return ONLY valid JSON, no other text.

  selling_point:
    enabled: true
    prompt: |
      Identify the single most impressive or distinctive element of this UPSC answer that would likely impress an examiner.

      Answer text:
      ---
      {answer_text}
      ---

      Look for: unusual statistics, specific report citations, constitutional article references, international comparisons, recent policy examples, elegant phrasing.

      Return strict JSON:
      {
        "selling_point_type": "statistic|report_citation|constitutional_ref|international_comparison|policy_example|elegant_phrasing|other",
        "exact_text": "the exact impressive text",
        "why_impressive": "brief explanation",
        "rarity": "common|uncommon|rare"
      }

      Return ONLY valid JSON, no other text.

# --- Step 6: Cross-PDF Aggregation ---
aggregation:
  prompt: |
    You are analyzing {count} UPSC topper answers across {candidates} different candidates.
    All answers are from GS (General Studies) papers.
    Questions are different across candidates.

    Below is the aggregated data for the [{dimension_name}] dimension.

    {dimension_data}

    Your task: identify patterns that appear across multiple candidates, backed by concrete examples.

    Return strict JSON:
    {{
      "dimension": "{dimension_name}",
      "total_analyzed": 0,
      "patterns": [
        {{
          "pattern_name": "",
          "description": "",
          "frequency": 0,
          "percentage": 0.0,
          "reusable_template": "",
          "examples": [
            {{
              "candidate": "",
              "question_directive": "",
              "exact_text": "",
              "what_makes_it_work": ""
            }}
          ],
          "when_to_use": "",
          "when_NOT_to_use": ""
        }}
      ],
      "anti_patterns": [
        {{
          "pattern": "",
          "why_avoid": "",
          "seen_in": 0
        }}
      ],
      "actionable_rules": [
        {{
          "rule": "",
          "evidence": "",
          "template": ""
        }}
      ]
    }}

    Only include patterns seen in minimum 10% of answers.
    Every pattern must have minimum 3 examples from different candidates.
    Templates must be immediately reusable.

    Return ONLY valid JSON, no other text.
