# =============================================================================
# UPSC Topper Answer Sheet Analysis — Prompt & Dimension Configuration
# =============================================================================
# All prompts are editable here without touching code.
# To add a new analysis dimension, add an entry under `dimensions:` and restart.
# =============================================================================

# --- LM Studio Settings ---
lm_studio:
  max_tokens: -1
  temperature: 0.0
  max_retries: 3
  retry_backoff_base: 2
  image_max_size: 2048   # Higher res for handwriting legibility

# --- Step 2: OCR Transcription (Vision Model Only) ---
transcription:
  prompt: |
    You are an expert OCR assistant specializing in Indian civil services (UPSC) exam answer sheets.
    Your mission is to provide a COMPLETE, WORD-FOR-WORD transcription of the provided image.

    ### CRITICAL INSTRUCTION:
    - Transcribe EVERYTHING in valid reading order (Top-to-Bottom, Left-to-Right).
    - NEVER skip handwriting. Handwritten content is the most important part of this document.
    - If you see a printed header followed by handwriting, transcribe the header and then immediately start transcribing the handwriting.
    - Capturing every single word is more important than formatting.

    ### Content to Capture:
    - Handwritten cursive English (Answers are usually here)
    - Printed English headers and questions
    - Diagrams: Describe them briefly [DIAGRAM: labels, description]
    - Margin notes or official stamps

    ### Rules:
    - Transcribe EXACTLY what is written — never correct spelling or grammar.
    - Unreadable words: write [?]
    - Underlines: <u>underline these words</u>
    - Boxes: [BOX: text]
    - Numbered lists: Keep original numbering (1, 1.1, ①, etc.)

    OUTPUT FORMAT:
    Simply provide the full text as it appears on the page. Use markdown headers (##) only if there is a very clear visual section break.

# --- Step 3: Page Classification (Text-Based) ---
classification:
  prompt: |
    You are an expert at classifying pages from Indian UPSC civil services exam answer sheets.
    You will receive the OCR-transcribed text from a page.

    Classify this page into EXACTLY ONE of these categories:
    - "cover" — Cover page with candidate name, registration number, test code, or exam instructions
    - "evaluation" — Evaluation/marks sheet with examiner markings, scores grid, or official stamps
    - "answer" — A page that starts a NEW answer to a question (has a printed question or clearly begins a new answer)
    - "continuation" — A page that continues an answer from the previous page (no new question header, writing continues)
    - "blank" — Empty page or page with only margin text/instructions, no substantive content

    Rules:
    - If you see candidate name, roll number, or test/paper codes (e.g., Name:, Test Code:, UPSC ID:), classify as "cover" IMMEDIATELY. This takes priority over all other rules.
    - If the text contains a printed question number (e.g., Q.1, Q.2) followed by answer text (and NO candidate metadata), classify as "answer".
    - If the text has only answer content continuing from a previous page with no new question header, classify as "continuation".
    - If you see evaluation marks, scoring grids, or examiner notes, classify as "evaluation".
    - If the text is mostly empty or only contains pre-printed instructions, classify as "blank".

    Respond with ONLY the category word, nothing else. No explanation, no quotes.

# --- Step 4: Answer Segmentation ---
segmentation:
  prompt: |
    You are an expert at segmenting UPSC answer sheets into distinct questions.
    Below are the transcribed pages in order. Each page is marked with its page number.

    {pages_text}

    Your task:
    1. Identify EACH distinct answer (question-answer pair) and which pages it spans.
    2. Extract a CLEANED version of the answer text for each segment.

    ### Cleaning Rules for 'cleaned_answer_text':
    - REMOVE all boilerplate instructions (e.g., "(Please do not write anything...", "Candidates must not write on this margin", "Answer Questions NOT MORE THAN...", "Content of the Question is more important...", etc.)
    - REMOVE page markers (e.g., "Page | 1", "- Page 2 -", "amBlitz", "UPSC")
    - REMOVE printed headers that repeat on every page.
    - KEEP ONLY the actual question text and the candidate's handwritten answer text.
    - Ensure the text flows logically across page boundaries without repetition.

    For each answer, return:
    - question_number: e.g., "Q.1", "1(a)"
    - question_text: the full printed question text
    - question_directive: the verb (e.g., "Discuss", "Comment")
    - word_limit: if specified (e.g., 150)
    - start_page: start page number
    - end_page: end page number
    - cleaned_answer_text: the substantive text of the answer with ALL margin boilerplate and repeats removed.

    Return strict JSON array:
    [
      {
        "question_number": "Q.1",
        "question_text": "...",
        "question_directive": "...",
        "word_limit": 150,
        "start_page": 1,
        "end_page": 2,
        "cleaned_answer_text": "..."
      }
    ]

    Return ONLY valid JSON, no other text.

# --- Metadata Extraction ---
metadata:
  prompt: |
    Extract candidate metadata from this UPSC cover page transcription.
    Identify:
    - candidate_name: The name of the student.
    - test_code: The test/paper code (e.g., 1864).
    - upsc_id: The UPSC ID number (e.g., 883478).

    Return strict JSON:
    {
      "candidate_name": null,
      "test_code": null,
      "upsc_id": null
    }

    Return ONLY valid JSON, no other text.

# --- Step 5: Analysis Dimensions ---
# Each dimension is independent. To add a new one, just add an entry here.
dimensions:
  intro:
    enabled: true
    prompt: |
      Analyze only the introduction (first 2-3 sentences) of this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Identify: pattern type (definition/context/constitutional/statistical/question_reframe), exact text, effectiveness markers.

      Return strict JSON:
      {
        "pattern_type": "definition|context|constitutional|statistical|question_reframe",
        "text": "exact intro text",
        "word_count": 0,
        "has_definition": false,
        "has_statistic": false,
        "has_constitutional_ref": false,
        "has_current_event": false,
        "effectiveness_markers": []
      }

      Return ONLY valid JSON, no other text.

  outro:
    enabled: true
    prompt: |
      Analyze only the conclusion (last 2-3 sentences) of this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Identify: pattern type (recommendation/forward_looking/source_citation/balanced_view/way_forward), exact text, sources cited.

      Return strict JSON:
      {
        "pattern_type": "recommendation|forward_looking|source_citation|balanced_view|way_forward",
        "text": "exact outro text",
        "word_count": 0,
        "has_recommendation": false,
        "has_source_citation": false,
        "source_cited": null,
        "has_way_forward": false,
        "has_statistic": false
      }

      Return ONLY valid JSON, no other text.

  transition:
    enabled: true
    prompt: |
      Analyze the transition phrases and connectors used in this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Identify how the writer moves between introduction, body sections, and conclusion.

      Return strict JSON:
      {
        "intro_to_body_phrase": "exact phrase or null",
        "between_sections_phrases": [],
        "body_to_conclusion_phrase": "exact phrase or null",
        "transition_style": "abrupt|smooth|formulaic"
      }

      Return ONLY valid JSON, no other text.

  formatting:
    enabled: true
    prompt: |
      Analyze only the formatting and visual structure of this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Return strict JSON:
      {
        "numbering_style": "decimal|circled|bullet|mixed|none",
        "uses_boxes": false,
        "boxed_texts": [],
        "uses_underlines": false,
        "underlined_count": 0,
        "what_gets_underlined": [],
        "uses_strikethrough": false,
        "body_format": "numbered_points|paragraphs|mixed",
        "avg_lines_per_point": 0.0,
        "has_section_headers": false,
        "header_style": null
      }

      Return ONLY valid JSON, no other text.

  diagram:
    enabled: true
    prompt: |
      Analyze diagram usage in this UPSC answer.

      Answer text:
      ---
      {answer_text}
      ---

      Return strict JSON:
      {
        "has_diagram": false,
        "diagram_count": 0,
        "diagrams": [
          {
            "type": "map|flowchart|table|timeline|sketch|other",
            "position": "intro|middle|end",
            "labels": [],
            "caption": null,
            "spatial_description": "",
            "question_directive_that_triggered_it": null
          }
        ]
      }

      Return ONLY valid JSON, no other text.

  selling_point:
    enabled: true
    prompt: |
      Identify the single most impressive or distinctive element of this UPSC answer that would likely impress an examiner.

      Answer text:
      ---
      {answer_text}
      ---

      Look for: unusual statistics, specific report citations, constitutional article references, international comparisons, recent policy examples, elegant phrasing.

      Return strict JSON:
      {
        "selling_point_type": "statistic|report_citation|constitutional_ref|international_comparison|policy_example|elegant_phrasing|other",
        "exact_text": "the exact impressive text",
        "why_impressive": "brief explanation",
        "rarity": "common|uncommon|rare"
      }

      Return ONLY valid JSON, no other text.

# --- Step 6: Cross-PDF Aggregation ---
aggregation:
  prompt: |
    You are analyzing {count} UPSC topper answers across {candidates} different candidates.
    All answers are from GS (General Studies) papers.
    Questions are different across candidates.

    Below is the aggregated data for the [{dimension_name}] dimension.

    {dimension_data}

    Your task: identify patterns that appear across multiple candidates, backed by concrete examples.

    Return strict JSON:
    {{
      "dimension": "{dimension_name}",
      "total_analyzed": 0,
      "patterns": [
        {{
          "pattern_name": "",
          "description": "",
          "frequency": 0,
          "percentage": 0.0,
          "reusable_template": "",
          "examples": [
            {{
              "candidate": "",
              "question_directive": "",
              "exact_text": "",
              "what_makes_it_work": ""
            }}
          ],
          "when_to_use": "",
          "when_NOT_to_use": ""
        }}
      ],
      "anti_patterns": [
        {{
          "pattern": "",
          "why_avoid": "",
          "seen_in": 0
        }}
      ],
      "actionable_rules": [
        {{
          "rule": "",
          "evidence": "",
          "template": ""
        }}
      ]
    }}

    Only include patterns seen in minimum 10% of answers.
    Every pattern must have minimum 3 examples from different candidates.
    Templates must be immediately reusable.

    Return ONLY valid JSON, no other text.
