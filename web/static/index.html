<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AICLI</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main id="app">
      <aside>
        <strong>AICLI</strong>
        <nav aria-label="Primary navigation">
          <div id="primary-tabs" role="tablist" aria-label="Main views">
            <button type="button" role="tab" id="tab-chat" aria-controls="view" aria-selected="false" data-view="chat">Chat</button>
            <button type="button" role="tab" id="tab-workflows" aria-controls="view" aria-selected="false" data-view="workflows">Workflows</button>
            <button type="button" role="tab" id="tab-jobs" aria-controls="view" aria-selected="false" data-view="jobs">Jobs</button>
            <button type="button" role="tab" id="tab-providers" aria-controls="view" aria-selected="false" data-view="providers">Providers</button>
            <button type="button" role="tab" id="tab-tools" aria-controls="view" aria-selected="false" data-view="tools">Tools</button>
            <button type="button" role="tab" id="tab-settings" aria-controls="view" aria-selected="false" data-view="settings">Settings</button>
          </div>
        </nav>
      </aside>
      <section>
        <header>
          <h1>Local AI Control Center</h1>
          <span id="health">checking</span>
        </header>
        <div id="view"></div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
